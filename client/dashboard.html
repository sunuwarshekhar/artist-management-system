<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body class="dashboard-page">
    <nav class="navbar">
      <a href="dashboard.html" class="navbar-brand">Artist Management</a>

      <div class="navbar-actions">
        <span id="user-name" class="navbar-user"></span>
        <button id="logout-btn" type="button" class="navbar-logout">
          Logout
        </button>
      </div>
    </nav>

    <main class="dashboard-content">
      <!-- <h1>Dashboard</h1> -->

      <div class="tabs-bar">
        <div class="tabs">
          <button type="button" class="tab-btn active" data-tab="users">
            Users
          </button>
          <button type="button" class="tab-btn" data-tab="artists">
            Artists
          </button>
        </div>
        <button
          id="create-user-btn"
          type="button"
          class="btn-create-user"
          disabled
        >
          + Create User
        </button>
        <button
          id="create-artist-btn"
          type="button"
          class="btn-create-user hidden"
          disabled
        >
          + Create Artist
        </button>
      </div>

      <section id="users-panel" class="tab-panel active">
        <div id="users-content">
          <p id="users-error" class="error"></p>
          <div class="table-wrap table-wrap-fixed">
            <table class="data-table data-table-fixed">
              <colgroup>
                <col class="col-name" />
                <col class="col-email" />
                <col class="col-role" />
                <col class="col-phone" />
                <col class="col-actions" />
              </colgroup>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Phone</th>
                  <th class="col-actions-cell">Actions</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <tr>
                  <td colspan="5" class="table-empty">Loading users...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination-slot">
            <div id="users-pagination" class="pagination hidden">
              <button
                type="button"
                class="pagination-btn"
                data-pagination-prev
                aria-label="Previous page"
              >
                <i class="fa fa-chevron-left" aria-hidden="true"></i>
              </button>
              <span class="pagination-info" data-pagination-info></span>
              <button
                type="button"
                class="pagination-btn"
                data-pagination-next
                aria-label="Next page"
              >
                <i class="fa fa-chevron-right" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section id="artists-panel" class="tab-panel">
        <div id="artists-content">
          <p id="artists-error" class="error"></p>
          <div class="table-wrap table-wrap-fixed">
            <table class="data-table data-table-fixed">
              <colgroup>
                <col class="col-name" />
                <col class="col-albums" />
                <col class="col-year" />
                <col class="col-actions" />
              </colgroup>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Albums Released</th>
                  <th>First Release Year</th>
                  <th class="col-actions-cell">Actions</th>
                </tr>
              </thead>
              <tbody id="artists-table-body">
                <tr>
                  <td colspan="4" class="table-empty">Loading artists...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination-slot">
            <div id="artists-pagination" class="pagination hidden">
              <button
                type="button"
                class="pagination-btn"
                data-pagination-prev
                aria-label="Previous page"
              >
                <i class="fa fa-chevron-left" aria-hidden="true"></i>
              </button>
              <span class="pagination-info" data-pagination-info></span>
              <button
                type="button"
                class="pagination-btn"
                data-pagination-next
                aria-label="Next page"
              >
                <i class="fa fa-chevron-right" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="artist-form-modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="artist-form-modal"></div>
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 id="artist-form-title">Create Artist</h2>
          <button
            type="button"
            class="modal-close"
            data-close-modal="artist-form-modal"
            aria-label="Close"
          >
            <i class="fa fa-times" aria-hidden="true"></i>
          </button>
        </div>
        <form id="artist-form">
          <div class="modal-body">
            <p id="artist-form-error" class="error"></p>
            <div class="form-grid">
              <div class="form-field form-field-full" id="artist-user-field">
                <label for="artist-user-search">Artist User</label>
                <div class="combobox" id="artist-user-combobox">
                  <input type="hidden" id="artist-user-id" name="user_id" />
                  <input
                    type="text"
                    id="artist-user-search"
                    placeholder="Search by name or email..."
                    autocomplete="off"
                    required
                  />
                  <ul
                    id="artist-user-options"
                    class="combobox-list hidden"
                    role="listbox"
                  ></ul>
                </div>
              </div>
              <div class="form-field form-field-full">
                <label for="artist-name">Name</label>
                <input type="text" id="artist-name" name="name" required />
              </div>
              <div class="form-field">
                <label for="artist-dob">Date of Birth</label>
                <input type="date" id="artist-dob" name="dob" required />
              </div>
              <div class="form-field">
                <label for="artist-gender">Gender</label>
                <select id="artist-gender" name="gender" required>
                  <option value="">select gender</option>
                  <option value="m">Male</option>
                  <option value="f">Female</option>
                  <option value="o">Other</option>
                </select>
              </div>
              <div class="form-field">
                <label for="artist-first-release-year"
                  >First Release Year</label
                >
                <input
                  type="number"
                  id="artist-first-release-year"
                  name="first_release_year"
                  min="1900"
                  max="2099"
                />
              </div>
              <div class="form-field">
                <label for="artist-albums">Albums Released</label>
                <input
                  type="number"
                  id="artist-albums"
                  name="no_of_albums_released"
                  min="0"
                  value="0"
                />
              </div>
              <div class="form-field form-field-full">
                <label for="artist-address">Address</label>
                <input
                  type="text"
                  id="artist-address"
                  name="address"
                  required
                />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn-secondary"
              data-close-modal="artist-form-modal"
            >
              Cancel
            </button>
            <button type="submit" id="artist-form-submit" class="btn-primary">
              Create
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="delete-artist-modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="delete-artist-modal"></div>
      <div class="modal-dialog modal-dialog-sm">
        <div class="modal-header">
          <h2>Delete Artist</h2>
          <button
            type="button"
            class="modal-close"
            data-close-modal="delete-artist-modal"
            aria-label="Close"
          >
            <i class="fa fa-times" aria-hidden="true"></i>
          </button>
        </div>
        <div class="modal-body">
          <p id="delete-artist-message"></p>
          <p id="delete-artist-error" class="error"></p>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-secondary"
            data-close-modal="delete-artist-modal"
          >
            Cancel
          </button>
          <button type="button" id="delete-artist-confirm" class="btn-danger">
            Delete
          </button>
        </div>
      </div>
    </div>

    <div id="user-form-modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="user-form-modal"></div>
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 id="user-form-title">Create User</h2>
          <button
            type="button"
            class="modal-close"
            data-close-modal="user-form-modal"
            aria-label="Close"
          >
            <i class="fa fa-times" aria-hidden="true"></i>
          </button>
        </div>
        <form id="user-form">
          <div class="modal-body">
            <p id="user-form-error" class="error"></p>
            <div class="form-grid">
              <div class="form-field">
                <label for="user-first-name">First Name</label>
                <input
                  type="text"
                  id="user-first-name"
                  name="first_name"
                  required
                />
              </div>
              <div class="form-field">
                <label for="user-last-name">Last Name</label>
                <input
                  type="text"
                  id="user-last-name"
                  name="last_name"
                  required
                />
              </div>
              <div class="form-field">
                <label for="user-email">Email</label>
                <input type="email" id="user-email" name="email" required />
              </div>
              <div class="form-field" id="password-field">
                <label for="user-password">Password</label>
                <input
                  type="password"
                  id="user-password"
                  name="password"
                  minlength="8"
                />
              </div>
              <div class="form-field">
                <label for="user-role">Role</label>
                <select id="user-role" name="role" required>
                  <option value="artist_manager">Artist Manager</option>
                  <option value="artist">Artist</option>
                  <option value="super_admin">Super Admin</option>
                </select>
              </div>
              <div class="form-field">
                <label for="user-phone">Phone</label>
                <input
                  type="tel"
                  id="user-phone"
                  name="phone"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  maxlength="10"
                />
              </div>
              <div class="form-field">
                <label for="user-dob">Date of Birth</label>
                <input type="date" id="user-dob" name="dob" />
              </div>
              <div class="form-field">
                <label for="user-gender">Gender</label>
                <select id="user-gender" name="gender" required>
                  <option value="">select gender</option>
                  <option value="m">Male</option>
                  <option value="f">Female</option>
                  <option value="o">Other</option>
                </select>
              </div>
              <div class="form-field form-field-full">
                <label for="user-address">Address</label>
                <input type="text" id="user-address" name="address" />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn-secondary"
              data-close-modal="user-form-modal"
            >
              Cancel
            </button>
            <button type="submit" id="user-form-submit" class="btn-primary">
              Save
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="user-detail-modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="user-detail-modal"></div>
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 id="user-detail-title">User Details</h2>
          <button
            type="button"
            class="modal-close"
            data-close-modal="user-detail-modal"
            aria-label="Close"
          >
            <i class="fa fa-times" aria-hidden="true"></i>
          </button>
        </div>
        <div class="modal-body">
          <p id="user-detail-error" class="error"></p>
          <div id="user-detail-content" class="detail-grid"></div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-secondary"
            data-close-modal="user-detail-modal"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <div id="delete-user-modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="delete-user-modal"></div>
      <div class="modal-dialog modal-dialog-sm">
        <div class="modal-header">
          <h2>Delete User</h2>
          <button
            type="button"
            class="modal-close"
            data-close-modal="delete-user-modal"
            aria-label="Close"
          >
            <i class="fa fa-times" aria-hidden="true"></i>
          </button>
        </div>
        <div class="modal-body">
          <p id="delete-user-message"></p>
          <p id="delete-user-error" class="error"></p>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-secondary"
            data-close-modal="delete-user-modal"
          >
            Cancel
          </button>
          <button type="button" id="delete-user-confirm" class="btn-danger">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/text.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
