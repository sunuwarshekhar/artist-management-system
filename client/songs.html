<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Songs</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body class="dashboard-page">
    <nav class="navbar">
      <a href="dashboard.html" id="navbar-brand" class="navbar-brand"
        >Artist Management</a
      >

      <div class="navbar-actions">
        <span id="user-name" class="navbar-user"></span>
        <button id="logout-btn" type="button" class="navbar-logout">
          Logout
        </button>
      </div>
    </nav>

    <main class="dashboard-content">
      <div class="songs-header">
        <div class="songs-header-main">
          <a id="back-to-artists" href="#" class="songs-back-link hidden">
            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back
          </a>
          <h1 id="songs-page-title" class="songs-page-title">Songs</h1>
        </div>
        <button
          id="create-song-btn"
          type="button"
          class="btn-create-user hidden"
        >
          + Create Song
        </button>
      </div>

      <p id="songs-error" class="error"></p>

      <div class="table-wrap table-wrap-fixed songs-page">
        <table class="data-table data-table-fixed">
          <colgroup>
            <col class="col-song-title" />
            <col class="col-song-album" />
            <col class="col-song-genre" />
            <col class="col-actions hidden" id="songs-actions-col" />
          </colgroup>
          <thead>
            <tr>
              <th>Title</th>
              <th>Album</th>
              <th>Genre</th>
              <th class="col-actions-cell hidden" id="songs-actions-th">
                Actions
              </th>
            </tr>
          </thead>
          <tbody id="songs-table-body">
            <tr>
              <td colspan="3" class="table-empty">Loading songs...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-slot">
        <div id="songs-pagination" class="pagination hidden">
          <button
            type="button"
            class="pagination-btn"
            data-pagination-prev
            aria-label="Previous page"
          >
            <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
          </button>
          <span class="pagination-info" data-pagination-info></span>
          <button
            type="button"
            class="pagination-btn"
            data-pagination-next
            aria-label="Next page"
          >
            <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </main>

    <div id="song-form-modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="song-form-modal"></div>
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 id="song-form-title">Create Song</h2>
          <button
            type="button"
            class="modal-close"
            data-close-modal="song-form-modal"
            aria-label="Close"
          >
            <i class="fa-solid fa-times" aria-hidden="true"></i>
          </button>
        </div>
        <form id="song-form">
          <div class="modal-body">
            <p id="song-form-error" class="error"></p>
            <div class="form-grid">
              <div class="form-field form-field-full">
                <label for="song-title">Title</label>
                <input type="text" id="song-title" name="title" required />
              </div>
              <div class="form-field form-field-full">
                <label for="song-album">Album</label>
                <input type="text" id="song-album" name="album_name" required />
              </div>
              <div class="form-field form-field-full">
                <label for="song-genre">Genre</label>
                <select id="song-genre" name="genre" required>
                  <option value="">Select genre</option>
                  <option value="rnb">R&amp;B</option>
                  <option value="country">Country</option>
                  <option value="classic">Classic</option>
                  <option value="rock">Rock</option>
                  <option value="jazz">Jazz</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn-secondary"
              data-close-modal="song-form-modal"
            >
              Cancel
            </button>
            <button type="submit" id="song-form-submit" class="btn-primary">
              Create
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="delete-song-modal" class="modal hidden">
      <div class="modal-backdrop" data-close-modal="delete-song-modal"></div>
      <div class="modal-dialog modal-dialog-sm">
        <div class="modal-header">
          <h2>Delete Song</h2>
          <button
            type="button"
            class="modal-close"
            data-close-modal="delete-song-modal"
            aria-label="Close"
          >
            <i class="fa-solid fa-times" aria-hidden="true"></i>
          </button>
        </div>
        <div class="modal-body">
          <p id="delete-song-message"></p>
          <p id="delete-song-error" class="error"></p>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-secondary"
            data-close-modal="delete-song-modal"
          >
            Cancel
          </button>
          <button type="button" id="delete-song-confirm" class="btn-danger">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/text.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/songs.js"></script>
  </body>
</html>
